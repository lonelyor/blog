baseURL = 'https://blog.lonelyor.com/'
theme = "LoveIt"
defaultContentLanguage = "zh"
languageCode = "zh-cn"
hasCJKLanguage = true # 开启中日韩文字优化
title = "lonelyor 的博客"

# --- 导航菜单 ---
[[menu.main]]
    name = "首页"
    url = "/"
    weight = 1
[[menu.main]]
    name = "归档"
    url = "/posts/"
    weight = 2
[[menu.main]]
    name = "RSS订阅"
    url = "/index.xml"
    weight = 3

# --- 全局参数配置 ---
[params]
    # 修正点：将 author 从 string 置换为 object 结构
    [params.author]
        name = "lonelyor"
        link = "https://github.com/lonelyor" # 对应报错中的 .Site.Params.Author.link

    description = "闭门即是深山，读书随处净土。"
    keywords = ["编程", "技术", "AI", "安全", "自动化", "Dify", "Rust", "黑客", "博客", "lonelyor", "技术分享", "编程笔记", "安全研究", "网络安全", "渗透测试", "漏洞分析"]
    
    # 社交扩展
    [params.social]
        GitHub = "lonelyor"
        RSS = true

    # 强制默认主题模式
    defaultTheme = "dark"

# --- Markdown 与代码高亮 ---
[markup]
    [markup.highlight]
        anchorLineNos = true
        codeFences = true
        guessSyntax = true
        lineNoStart = 1
        lineNos = true
        style = "dracula"
        tabWidth = 4
    [markup.goldmark.renderer]
        unsafe = true

    [markup.tableOfContents]
        startLevel = 2
        endLevel = 3

# --- 内容分类 ---
[taxonomies]
    tag = "tags"
    category = "categories"
    series = "series"

# --- 优化与性能 ---
[minify]
    minifyOutput = true

[sitemap]
    changefreq = 'weekly'
    priority = 0.5
    filename = 'sitemap.xml'

# 2. 多语言定义
[languages]
  [languages.zh]
    languageName = "中文"
    contentDir = "content"
    weight = 1
    title = "lonelyor 的技术净土"

  [languages.en]
    languageName = "English"
    contentDir = "content/en"
    weight = 2
    title = "lonelyor's Security Lab"

# --- 全局 RSS 路径配置 ---
[outputs]
    home = ["HTML", "RSS"]

[services]
    [services.rss]
        limit = 20