baseURL = 'https://blog.lonelyor.com/'
theme = "noir"
defaultContentLanguage = "zh"
languageCode = "zh-cn"
title = "lonelyor 的博客"

# --- 导航菜单 (直接使用中文) ---
[[menu.main]]
    name = "首页"
    url = "/"
    weight = 1
[[menu.main]]
    name = "归档"
    url = "/posts/"
    weight = 2

# --- 全局参数配置 ---
[params]
    author = "lonelyor"
    description = "专注于编程与技术的个人博客。"
    keywords = ["编程", "技术", "AI", "安全", "自动化", "Dify", "Rust"]
    
    # 社交扩展
    [[params.social]]
        name = "github"
        icon = "github"
        url = "https://github.com/lonelyor"
    [[params.social]]
        name = "rss"
        icon = "rss"
        url = "/index.xml"

# --- Markdown 与代码高亮 (针对 Rust/技术文章优化) ---
[markup]
    [markup.highlight]
        anchorLineNos = true
        codeFences = true
        guessSyntax = true
        lineNoStart = 1
        lineNos = true
        style = "dracula"
        tabWidth = 4
    [markup.goldmark.renderer]
        unsafe = true
    [markup.tableOfContents]
        startLevel = 2
        endLevel = 3

# --- 内容分类 ---
[taxonomies]
    tag = "tags"
    category = "categories"
    series = "series"

# --- 优化与性能 ---
[minify]
    minifyOutput = true

[sitemap]
    changefreq = 'weekly'
    priority = 0.5
    filename = 'sitemap.xml'

[services]
    [services.rss]
        limit = 20