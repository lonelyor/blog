baseURL = 'https://blog.lonelyor.com/'
theme = "noir"
defaultContentLanguage = "zh"
languageCode = "zh-cn"
hasCJKLanguage = true # 开启中日韩文字优化，这对中文搜索和字数统计至关重要
title = "lonelyor 的博客"

# --- 导航菜单 (直接使用中文) ---
[[menu.main]]
    name = "首页"
    url = "/"
    weight = 1
[[menu.main]]
    name = "归档"
    url = "/posts/"
    weight = 2

# --- 全局参数配置 ---
[params]
    author = "lonelyor"
    description = "闭门即是深山，读书随处净土。"
    keywords = ["编程", "技术", "AI", "安全", "自动化", "Dify", "Rust", "黑客", "博客", "lonelyor", "技术分享", "编程笔记", "安全研究", "网络安全", "渗透测试", "漏洞分析"]
    
    # 社交扩展
    [[params.social]]
        name = "github"
        icon = "github"
        url = "https://github.com/lonelyor"
    [[params.social]]
        name = "rss"
        icon = "rss"
        url = "/index.xml"

    # 强制默认主题模式 (取决于主题具体的参数名，通常是这两个之一)
    defaultTheme = "dark"
    themeMode = "dark" 

# --- Markdown 与代码高亮 (针对 Rust/技术文章优化) ---
[markup]
    [markup.highlight]
        anchorLineNos = true
        codeFences = true
        guessSyntax = true
        lineNoStart = 1
        lineNos = true
        style = "dracula"
        tabWidth = 4
    [markup.goldmark.renderer]
        unsafe = true
    [markup.tableOfContents]
        startLevel = 2
        endLevel = 3

# --- 内容分类 ---
[taxonomies]
    tag = "tags"
    category = "categories"
    series = "series"

# --- 优化与性能 ---
[minify]
    minifyOutput = true

[sitemap]
    changefreq = 'weekly'
    priority = 0.5
    filename = 'sitemap.xml'

[services]
    [services.rss]
        limit = 20

# 2. 多语言定义
[languages]
  [languages.zh]
    languageName = "中文"
    contentDir = "content" # 你的主战场
    weight = 1
    title = "lonelyor 的技术净土"

  [languages.en]
    languageName = "English"
    contentDir = "content/en" # 英文版放在子文件夹
    weight = 2
    title = "lonelyor's Security Lab"